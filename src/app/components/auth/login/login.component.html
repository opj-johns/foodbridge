<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-semibold text-center text-gray-700 mb-6">Login to FoodBridge</h2>
      
      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" novalidate>
        <!-- Email Field -->
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-600">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:outline-none focus:ring focus:border-blue-300"
            placeholder="Enter your email"
          />
          <div *ngIf="signupForm.get('email')!.invalid && signupForm.get('email')!.touched" class="text-red-500 text-sm mt-1">
            Please enter a valid email.
          </div>
        </div>
  
        <!-- Password Field -->
        <div class="mb-4">
          <label for="password" class="block text-sm font-medium text-gray-600">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="mt-1 block w-full px-4 py-2 border rounded-md shadow-sm focus:outline-none focus:ring focus:border-blue-300"
            placeholder="Enter your password"
          />
          <div *ngIf="signupForm.get('password')!.invalid && signupForm.get('password')!.touched" class="text-red-500 text-sm mt-1">
            Password must be at least 6 characters long.
          </div>
        </div>
  
       
  
        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full bg-blue-500 text-white font-semibold py-2 px-4 rounded hover:bg-blue-600 transition duration-200 disabled:opacity-50"
        >
          Sign Up
        </button>
      </form>
  
      <p class="text-sm text-center text-gray-600 mt-6">
        Do not have an account? <a routerLink="/signup" class="text-blue-500 hover:underline">Signup</a>
      </p>
    </div>
  </div>
