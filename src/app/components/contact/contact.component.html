<!-- contact-us.component.html -->
<section class="py-16 bg-[#FBECE5]" id="contact-us">
  <div class="container mx-auto px-4 md:px-8">
    <!-- Title and Subheading -->
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold text-[#440047]">Get in Touch</h2>
      <p class="text-lg text-[#440047]/80 mt-2">
        We’d love to hear from you. Whether you have a question, feedback, or just want to connect, reach out today!
      </p>
    </div>

    <!-- Contact Section Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <!-- Contact Form -->
      <div>
        <form (submit)="onSubmit()" class="space-y-6">
          <!-- Name Field -->
          <div>
            <label for="name" class="block text-[#440047] font-medium mb-2">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="w-full border border-[#91D18B] rounded-lg p-3 text-[#440047] focus:outline-none focus:ring-2 focus:ring-[#91D18B]"
              placeholder="Your Name"
              required
            />
          </div>

          <!-- Email Field -->
          <div>
            <label for="email" class="block text-[#440047] font-medium mb-2">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full border border-[#91D18B] rounded-lg p-3 text-[#440047] focus:outline-none focus:ring-2 focus:ring-[#91D18B]"
              placeholder="Your Email"
              required
            />
          </div>

          <!-- Phone Field -->
          <div>
            <label for="phone" class="block text-[#440047] font-medium mb-2">Phone Number (Optional)</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              class="w-full border border-[#91D18B] rounded-lg p-3 text-[#440047] focus:outline-none focus:ring-2 focus:ring-[#91D18B]"
              placeholder="Your Phone Number"
            />
          </div>

          <!-- Message Field -->
          <div>
            <label for="message" class="block text-[#440047] font-medium mb-2">Message</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              class="w-full border border-[#91D18B] rounded-lg p-3 text-[#440047] focus:outline-none focus:ring-2 focus:ring-[#91D18B]"
              placeholder="Your Message"
              required
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full bg-[#E11D74] text-white font-bold py-3 px-6 rounded-lg shadow hover:bg-[#440047] transition-colors"
          >
            Send Message
          </button>
        </form>
      </div>

      <!-- Contact Information -->
      <div>
        <div class="space-y-6">
          <div class="flex items-center">
            <img src="assets/icons/email.svg" alt="Email Icon" class="w-6 h-6 mr-4">
            <p class="text-lg text-[#440047]">meal.bridge101&#64;gmail.com</p>
          </div>
          <div class="flex items-center">
            <img src="assets/icons/phone.svg" alt="Phone Icon" class="w-6 h-6 mr-4">
            <p class="text-lg text-[#440047]">+123 456 7890</p>
          </div>
          <div class="flex items-center">
            <img src="assets/icons/location.svg" alt="Location Icon" class="w-6 h-6 mr-4">
            <p class="text-lg text-[#440047]">123 NGO Street, City, Country</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
