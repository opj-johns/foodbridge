<!-- header.component.html -->
<header class="fixed top-0 w-full z-50 bg-[#FBECE5] shadow-md">
  <div class="container mx-auto flex justify-between items-center py-4 px-4 md:px-8">
    <!-- Logo -->
    <div class="text-2xl font-bold text-[#440047]">
     <a href="/">
      Food<span class="text-[#E11D74]">Bridge</span>
     </a> 
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex space-x-8 items-center text-[#440047]">
      <a routerLink="/about-us" routerLinkActive="Active"  class="hover:text-[#91D18B] transition">About Us</a>
      <a routerLink="/our-work" routerLinkActive="Active" class="hover:text-[#91D18B] transition">Our Work</a>
      <a routerLink="/get-involved" routerLinkActive="Active" class="hover:text-[#91D18B] transition">Get Involved</a>
      <a routerLink="/contact" class="hover:text-[#91D18B] transition">Contact</a>
      <button (click)="donate()" class="bg-[#E11D74] text-white px-4 py-2 rounded hover:bg-[#C01863] transition">
      Donate
      </button>
      <button (click)="signin()" class="bg-[#91D18B] text-white px-4 py-2 rounded hover:bg-[#7BB778] transition">
        Sign In
      </button>
    </nav>

    <!-- Mobile Menu Icon -->
    <button
      (click)="toggleMobileMenu()"
      class="md:hidden text-[#440047] focus:outline-none focus:ring-2 focus:ring-[#E11D74]"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
    </button>
  </div>

  <!-- Mobile Navigation -->
  <div *ngIf="isMobileMenuOpen" class="md:hidden bg-[#FBECE5] px-4 pb-4">
  <nav class="flex flex-col space-y-4 text-[#440047]">
      <a routerLink="/about-us" routerLinkActive="Active" class="hover:text-[#91D18B] transition">About Us</a>
      <a routerLink="/our-work" routerLinkActive="Active" class="hover:text-[#91D18B] transition">Our Work</a>
      <a routerLink="/get-involved" routerLinkActive="Active" class="hover:text-[#91D18B] transition">Get Involved</a>
      <a routerLink="/contact" class="hover:text-[#91D18B] transition" class="hover:text-[#91D18B] transition">Contact</a>
      <button (click)="donate()" class="bg-[#E11D74] text-white px-4 py-2 rounded hover:bg-[#C01863] transition">
        Donate
      </button>
      <button (click)="signin()" class="bg-[#91D18B] text-white px-4 py-2 rounded hover:bg-[#7BB778] transition">
        Sign In
      </button>
    </nav>
  </div>
</header>
